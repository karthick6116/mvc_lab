<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Enrollment Approvals</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-brand"><h2>🏛️ Department Head</h2><p th:text="${depthead.name}"></p></div>
        <a th:href="@{/depthead/dashboard}">📊 Dashboard</a>
        <a th:href="@{/depthead/enrollments}" class="active">📝 Enrollment Approvals</a>
        <a th:href="@{/depthead/grades}">🎯 Grade Reviews</a>
        <a th:href="@{/depthead/report}">📄 Download Report</a>
        <div class="sidebar-logout"><a th:href="@{/logout}" class="btn btn-danger btn-full btn-sm">Logout</a></div>
    </nav>
    <div class="main-content">
        <div class="topbar"><h1>Enrollment Approval Queue</h1></div>
        <div class="page">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <div class="card">
                <div class="card-title">Pending Requests</div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Student</th><th>Course</th><th>Applied On</th><th>Actions</th></tr></thead>
                        <tbody>
                        <tr th:each="enrollment : ${pendingEnrollments}">
                            <td>
                                <div class="strong" th:text="${enrollment.student.name}"></div>
                                <div class="muted small" th:text="${enrollment.student.studentId}"></div>
                            </td>
                            <td th:text="${enrollment.course.courseCode + ' - ' + enrollment.course.courseName}"></td>
                            <td th:text="${#dates.format(enrollment.enrollmentDate, 'yyyy-MM-dd HH:mm')}"></td>
                            <td>
                                <div class="action-stack horizontal">
                                    <form method="post" th:action="@{/depthead/enrollments/approve}">
                                        <input type="hidden" name="enrollmentId" th:value="${enrollment.enrollmentId}">
                                        <button type="submit" class="btn btn-success btn-sm">Approve</button>
                                    </form>
                                    <form method="post" th:action="@{/depthead/enrollments/reject}" class="inline-form compact-form">
                                        <input type="hidden" name="enrollmentId" th:value="${enrollment.enrollmentId}">
                                        <input type="text" name="reason" placeholder="Reason">
                                        <button type="submit" class="btn btn-danger btn-sm">Reject</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(pendingEnrollments)}"><td colspan="4" class="empty">No pending enrollment requests.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Department Enrollment History</div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Enrollment</th><th>Student</th><th>Course</th><th>Status</th><th>Reason</th></tr></thead>
                        <tbody>
                        <tr th:each="enrollment : ${allEnrollments}">
                            <td th:text="${enrollment.enrollmentId}"></td>
                            <td th:text="${enrollment.student.name}"></td>
                            <td th:text="${enrollment.course.courseCode + ' - ' + enrollment.course.courseName}"></td>
                            <td><span th:classappend="${enrollment.status.name().toLowerCase()}" class="badge badge-plain" th:text="${enrollment.status}"></span></td>
                            <td th:text="${enrollment.rejectionReason != null ? enrollment.rejectionReason : '—'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
