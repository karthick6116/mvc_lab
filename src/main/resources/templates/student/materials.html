<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Materials</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-brand"><h2>🎓 Student Portal</h2><p th:text="${student.name}"></p></div>
        <a th:href="@{/student/courses}">📚 Browse Courses</a>
        <a th:href="@{/student/enrollments}">📝 My Enrollments</a>
        <a th:href="@{/student/grades}">🎯 My Grades</a>
        <a th:href="@{/student/schedule}">📅 My Schedule</a>
        <a th:href="@{/student/attendance}">🕒 Attendance</a>
        <a th:href="@{/student/materials}" class="active">📁 Materials</a>
        <a th:href="@{/student/payments}">💳 Payments</a>
        <div class="sidebar-logout"><a th:href="@{/logout}" class="btn btn-danger btn-full btn-sm">Logout</a></div>
    </nav>
    <div class="main-content">
        <div class="topbar"><h1>Course Materials</h1></div>
        <div class="page">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Title</th><th>Course</th><th>Type</th><th>Uploaded</th><th>Action</th></tr></thead>
                        <tbody>
                        <tr th:each="material : ${materials}">
                            <td>
                                <div class="strong" th:text="${material.title}"></div>
                                <div class="muted small" th:text="${material.description}"></div>
                            </td>
                            <td th:text="${material.course.courseCode + ' - ' + material.course.courseName}"></td>
                            <td th:text="${material.fileType}"></td>
                            <td th:text="${#dates.format(material.uploadDate, 'yyyy-MM-dd HH:mm')}"></td>
                            <td><a class="btn btn-primary btn-sm" th:href="@{'/student/materials/download/' + ${material.materialId}}">Download</a></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(materials)}"><td colspan="5" class="empty">No materials available for your active courses yet.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
