<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payments</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-brand"><h2>🎓 Student Portal</h2><p th:text="${student.name}"></p></div>
        <a th:href="@{/student/courses}">📚 Browse Courses</a>
        <a th:href="@{/student/enrollments}">📝 My Enrollments</a>
        <a th:href="@{/student/grades}">🎯 My Grades</a>
        <a th:href="@{/student/schedule}">📅 My Schedule</a>
        <a th:href="@{/student/attendance}">🕒 Attendance</a>
        <a th:href="@{/student/materials}">📁 Materials</a>
        <a th:href="@{/student/payments}" class="active">💳 Payments</a>
        <div class="sidebar-logout"><a th:href="@{/logout}" class="btn btn-danger btn-full btn-sm">Logout</a></div>
    </nav>
    <div class="main-content">
        <div class="topbar"><h1>Fee Payments</h1></div>
        <div class="page">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>Course</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Due Date</th>
                            <th>Receipt</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="payment : ${payments}">
                            <td th:text="${payment.enrollment.course.courseCode + ' - ' + payment.enrollment.course.courseName}"></td>
                            <td th:text="${'$' + #numbers.formatDecimal(payment.amount, 1, 2)}"></td>
                            <td><span th:classappend="${payment.status.name().toLowerCase()}" class="badge badge-plain" th:text="${payment.status}"></span></td>
                            <td th:text="${#dates.format(payment.dueDate, 'yyyy-MM-dd')}"></td>
                            <td>
                                <span th:if="${payment.receiptNumber == null}" class="muted">—</span>
                                <span th:if="${payment.receiptNumber != null}" th:text="${payment.receiptNumber}"></span>
                            </td>
                            <td>
                                <form method="post" th:action="@{/student/payments/pay}" th:if="${payment.status.name() == 'PENDING' or payment.status.name() == 'FAILED'}" class="payment-form">
                                    <input type="hidden" name="paymentId" th:value="${payment.paymentId}">
                                    <select name="paymentMethod" required>
                                        <option value="">Method</option>
                                        <option value="Credit Card">Credit Card</option>
                                        <option value="Debit Card">Debit Card</option>
                                        <option value="Net Banking">Net Banking</option>
                                    </select>
                                    <label class="check-inline"><input type="checkbox" name="simulateFailure" value="true"> Simulate failure</label>
                                    <button type="submit" class="btn btn-success btn-sm">Pay</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(payments)}"><td colspan="6" class="empty">Payments are generated once an enrollment is approved.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
