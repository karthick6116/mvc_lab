<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Grades</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-brand"><h2>🎓 Student Portal</h2><p th:text="${student.name}"></p></div>
        <a th:href="@{/student/courses}">📚 Browse Courses</a>
        <a th:href="@{/student/enrollments}">📝 My Enrollments</a>
        <a th:href="@{/student/grades}" class="active">🎯 My Grades</a>
        <a th:href="@{/student/schedule}">📅 My Schedule</a>
        <a th:href="@{/student/attendance}">🕒 Attendance</a>
        <a th:href="@{/student/materials}">📁 Materials</a>
        <a th:href="@{/student/payments}">💳 Payments</a>
        <div class="sidebar-logout"><a th:href="@{/logout}" class="btn btn-danger btn-full btn-sm">Logout</a></div>
    </nav>
    <div class="main-content">
        <div class="topbar">
            <div>
                <h1>My Grades</h1>
                <p class="muted">Only approved grades are fully visible to students.</p>
            </div>
            <span class="badge badge-neutral" th:text="'CGPA ' + ${cgpa}"></span>
        </div>
        <div class="page">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>Course</th>
                            <th>Exam Type</th>
                            <th>Marks</th>
                            <th>Letter Grade</th>
                            <th>GPA</th>
                            <th>Status</th>
                            <th>Comments</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="enrollment : ${enrollments}">
                            <td th:text="${enrollment.course.courseCode + ' - ' + enrollment.course.courseName}"></td>
                            <td th:text="'—'"></td>
                            <td th:text="'Not submitted'"></td>
                            <td th:text="'—'"></td>
                            <td th:text="'—'"></td>
                            <td>
                                <span class="badge badge-neutral">Not submitted</span>
                            </td>
                            <td th:text="'Grades will appear here once faculty submits them.'"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(enrollments)}"><td colspan="7" class="empty">No grade records yet.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
