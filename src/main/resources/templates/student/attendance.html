<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Attendance</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-brand"><h2>🎓 Student Portal</h2><p th:text="${student.name}"></p></div>
        <a th:href="@{/student/courses}">📚 Browse Courses</a>
        <a th:href="@{/student/enrollments}">📝 My Enrollments</a>
        <a th:href="@{/student/grades}">🎯 My Grades</a>
        <a th:href="@{/student/schedule}">📅 My Schedule</a>
        <a th:href="@{/student/attendance}" class="active">🕒 Attendance</a>
        <a th:href="@{/student/materials}">📁 Materials</a>
        <a th:href="@{/student/payments}">💳 Payments</a>
        <div class="sidebar-logout"><a th:href="@{/logout}" class="btn btn-danger btn-full btn-sm">Logout</a></div>
    </nav>
    <div class="main-content">
        <div class="topbar"><h1>Attendance Record</h1></div>
        <div class="page">
            <div class="stats-grid compact-grid">
                <div class="stat-card" th:each="course : ${student.enrolledCourses}">
                    <div class="stat-label" th:text="${course.courseCode}"></div>
                    <div class="stat-num" th:text="${percentageMap[course.courseId]}"></div>
                    <div class="muted small" th:text="${course.courseName}"></div>
                </div>
                <div class="stat-card" th:if="${#lists.isEmpty(student.enrolledCourses)}">
                    <div class="stat-label">No active courses</div>
                    <div class="muted small">Attendance will appear once faculty records it.</div>
                </div>
            </div>

            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Date</th><th>Course</th><th>Status</th><th>Remarks</th></tr></thead>
                        <tbody>
                        <tr th:each="record : ${attendanceRecords}">
                            <td th:text="${#dates.format(record.date, 'yyyy-MM-dd')}"></td>
                            <td th:text="${record.course.courseCode + ' - ' + record.course.courseName}"></td>
                            <td><span th:classappend="${record.status.name().toLowerCase()}" class="badge badge-plain" th:text="${record.status}"></span></td>
                            <td th:text="${record.remarks != null && !record.remarks.isBlank() ? record.remarks : '—'}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(attendanceRecords)}"><td colspan="4" class="empty">Attendance has not been recorded yet.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
