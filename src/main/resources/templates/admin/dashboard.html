<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-brand"><h2>⚙️ Admin Portal</h2><p th:text="${admin.name}"></p></div>
        <a th:href="@{/admin/dashboard}" class="active">📊 Dashboard</a>
        <a th:href="@{/admin/courses}">📚 Manage Courses</a>
        <a th:href="@{/admin/users}">👥 Users</a>
        <a th:href="@{/admin/enrollments}">📝 Enrollments & Payments</a>
        <a th:href="@{/signup}">➕ Add New User</a>
        <a th:href="@{/admin/report}">📄 Download Report</a>
        <div class="sidebar-logout"><a th:href="@{/logout}" class="btn btn-danger btn-full btn-sm">Logout</a></div>
    </nav>

    <div class="main-content">
        <div class="topbar"><h1>System Dashboard</h1></div>
        <div class="page">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-num" th:text="${totalUsers}"></div><div class="stat-label">Users</div></div>
                <div class="stat-card"><div class="stat-num" th:text="${totalStudents}"></div><div class="stat-label">Students</div></div>
                <div class="stat-card"><div class="stat-num" th:text="${totalFaculty}"></div><div class="stat-label">Faculty</div></div>
                <div class="stat-card"><div class="stat-num" th:text="${totalCourses}"></div><div class="stat-label">Courses</div></div>
                <div class="stat-card"><div class="stat-num" th:text="${totalEnrollments}"></div><div class="stat-label">Enrollments</div></div>
                <div class="stat-card"><div class="stat-num" th:text="${pendingEnrollments}"></div><div class="stat-label">Pending Approvals</div></div>
                <div class="stat-card"><div class="stat-num" th:text="${totalPayments}"></div><div class="stat-label">Payments</div></div>
            </div>

            <div class="card">
                <div class="card-title">Quick Actions</div>
                <div class="action-stack horizontal">
                    <a class="btn btn-primary" th:href="@{/admin/courses}">Manage courses</a>
                    <a class="btn btn-primary" th:href="@{/admin/users}">Manage users</a>
                    <a class="btn btn-primary" th:href="@{/admin/enrollments}">View enrollments</a>
                    <a class="btn btn-success" th:href="@{/signup}">Create user</a>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Report Preview</div>
                <pre class="report-preview" th:text="${reportPreview}"></pre>
            </div>
        </div>
    </div>
</div>
</body>
</html>
