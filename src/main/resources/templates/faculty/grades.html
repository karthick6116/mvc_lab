<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Submit Grades</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-brand"><h2>👨‍🏫 Faculty Portal</h2><p th:text="${faculty.name}"></p></div>
        <a th:href="@{/faculty/courses}">📚 Assigned Courses</a>
        <a th:href="@{/faculty/students}">👥 Enrolled Students</a>
        <a th:href="@{/faculty/grades}" class="active">📝 Submit Grades</a>
        <a th:href="@{/faculty/attendance}">🕒 Attendance</a>
        <a th:href="@{/faculty/materials}">📁 Course Materials</a>
        <div class="sidebar-logout"><a th:href="@{/logout}" class="btn btn-danger btn-full btn-sm">Logout</a></div>
    </nav>
    <div class="main-content">
        <div class="topbar"><h1>Grade Submission</h1></div>
        <div class="page">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div class="card">
                <form method="get" th:action="@{/faculty/grades}" class="inline-form">
                    <select name="courseId">
                        <option value="">Select course</option>
                        <option th:each="c : ${courses}" th:value="${c.courseId}" th:text="${c.courseCode + ' - ' + c.courseName}" th:selected="${course != null and course.courseId == c.courseId}"></option>
                    </select>
                    <button type="submit" class="btn btn-primary">Load Course</button>
                </form>
            </div>

            <div class="card" th:if="${course != null}">
                <div class="card-title" th:text="${'Submit grades for ' + course.courseCode + ' - ' + course.courseName}"></div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Student</th><th>Current Grade</th><th>Status</th><th>Comments</th><th>Submit / Update</th></tr></thead>
                        <tbody>
                        <tr th:each="enrollment : ${enrollments}">
                            <td>
                                <div class="strong" th:text="${enrollment.student.name}"></div>
                                <div class="muted small" th:text="${enrollment.student.studentId}"></div>
                            </td>
                            <td th:text="'Not submitted'"></td>
                            <td>
                                <span class="badge badge-neutral">Pending</span>
                            </td>
                            <td th:text="'—'"></td>
                            <td>
                                <form method="post" th:action="@{/faculty/grades/submit}" class="inline-form compact-form">
                                    <input type="hidden" name="enrollmentId" th:value="${enrollment.enrollmentId}">
                                    <input type="number" name="marks" min="0" step="0.01" placeholder="Marks" required>
                                    <input type="number" name="totalMarks" min="1" step="0.01" placeholder="Total" required>
                                    <select name="examType">
                                        <option value="Final">Final</option>
                                        <option value="Midterm">Midterm</option>
                                        <option value="Quiz">Quiz</option>
                                    </select>
                                    <button type="submit" class="btn btn-success btn-sm">Submit</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(enrollments)}"><td colspan="5" class="empty">No approved students available for grade submission.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
