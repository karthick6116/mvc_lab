<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Attendance</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-brand"><h2>👨‍🏫 Faculty Portal</h2><p th:text="${faculty.name}"></p></div>
        <a th:href="@{/faculty/courses}">📚 Assigned Courses</a>
        <a th:href="@{/faculty/students}">👥 Enrolled Students</a>
        <a th:href="@{/faculty/grades}">📝 Submit Grades</a>
        <a th:href="@{/faculty/attendance}" class="active">🕒 Attendance</a>
        <a th:href="@{/faculty/materials}">📁 Course Materials</a>
        <div class="sidebar-logout"><a th:href="@{/logout}" class="btn btn-danger btn-full btn-sm">Logout</a></div>
    </nav>
    <div class="main-content">
        <div class="topbar"><h1>Attendance Management</h1></div>
        <div class="page">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div class="card">
                <form method="get" th:action="@{/faculty/attendance}" class="inline-form">
                    <select name="courseId">
                        <option value="">Select course</option>
                        <option th:each="c : ${courses}" th:value="${c.courseId}" th:text="${c.courseCode + ' - ' + c.courseName}" th:selected="${course != null and course.courseId == c.courseId}"></option>
                    </select>
                    <input type="date" name="date" th:value="${selectedDate}">
                    <button type="submit" class="btn btn-primary">Load Register</button>
                </form>
            </div>

            <div class="card" th:if="${course != null}">
                <div class="card-title" th:text="${'Mark attendance for ' + course.courseCode + ' on ' + selectedDate}"></div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Student</th><th>Current Recorded</th><th>Mark / Update</th></tr></thead>
                        <tbody>
                        <tr th:each="enrollment : ${enrollments}" th:with="existing=${attendanceMap[enrollment.student.userId]}">
                            <td>
                                <div class="strong" th:text="${enrollment.student.name}"></div>
                                <div class="muted small" th:text="${enrollment.student.studentId}"></div>
                            </td>
                            <td>
                                <span th:if="${existing == null}" class="badge badge-neutral">Not marked</span>
                                <div th:if="${existing != null}">
                                    <span th:classappend="${existing.status.name().toLowerCase()}" class="badge badge-plain" th:text="${existing.status}"></span>
                                    <div class="muted small" th:text="${existing.remarks != null && !existing.remarks.isBlank() ? existing.remarks : 'No remarks'}"></div>
                                </div>
                            </td>
                            <td>
                                <form method="post" th:action="@{/faculty/attendance/mark}" class="inline-form compact-form">
                                    <input type="hidden" name="courseId" th:value="${course.courseId}">
                                    <input type="hidden" name="studentUserId" th:value="${enrollment.student.userId}">
                                    <input type="hidden" name="date" th:value="${selectedDate}">
                                    <select name="status">
                                        <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}" th:selected="${existing != null and existing.status.name() == status.name()}"></option>
                                    </select>
                                    <input type="text" name="remarks" placeholder="Optional remarks" th:value="${existing != null ? existing.remarks : ''}">
                                    <button type="submit" class="btn btn-success btn-sm" th:text="${existing != null ? 'Update' : 'Save'}"></button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(enrollments)}"><td colspan="3" class="empty">No active students to mark.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
