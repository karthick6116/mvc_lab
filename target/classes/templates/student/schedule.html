<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Schedule</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-brand"><h2>🎓 Student Portal</h2><p th:text="${student.name}"></p></div>
        <a th:href="@{/student/courses}">📚 Browse Courses</a>
        <a th:href="@{/student/enrollments}">📝 My Enrollments</a>
        <a th:href="@{/student/grades}">🎯 My Grades</a>
        <a th:href="@{/student/schedule}" class="active">📅 My Schedule</a>
        <a th:href="@{/student/attendance}">🕒 Attendance</a>
        <a th:href="@{/student/materials}">📁 Materials</a>
        <a th:href="@{/student/payments}">💳 Payments</a>
        <div class="sidebar-logout"><a th:href="@{/logout}" class="btn btn-danger btn-full btn-sm">Logout</a></div>
    </nav>
    <div class="main-content">
        <div class="topbar"><h1>My Weekly Schedule</h1></div>
        <div class="page">
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Day</th><th>Time</th><th>Course</th><th>Room</th><th>Building</th></tr></thead>
                        <tbody>
                        <th:block th:each="enrollment : ${enrollments}">
                            <tr th:each="schedule : ${enrollment.course.schedules}">
                                <td th:text="${schedule.dayOfWeek}"></td>
                                <td th:text="${schedule.startTime + ' - ' + schedule.endTime}"></td>
                                <td th:text="${enrollment.course.courseCode + ' - ' + enrollment.course.courseName}"></td>
                                <td th:text="${schedule.room}"></td>
                                <td th:text="${schedule.building}"></td>
                            </tr>
                        </th:block>
                        <tr th:if="${#lists.isEmpty(enrollments)}"><td colspan="5" class="empty">No active schedule yet. Once your enrollments are approved they will appear here.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
