<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Department Head Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-brand"><h2>🏛️ Department Head</h2><p th:text="${depthead.name}"></p></div>
        <a th:href="@{/depthead/dashboard}" class="active">📊 Dashboard</a>
        <a th:href="@{/depthead/enrollments}">📝 Enrollment Approvals</a>
        <a th:href="@{/depthead/grades}">🎯 Grade Reviews</a>
        <a th:href="@{/depthead/report}">📄 Download Report</a>
        <div class="sidebar-logout"><a th:href="@{/logout}" class="btn btn-danger btn-full btn-sm">Logout</a></div>
    </nav>

    <div class="main-content">
        <div class="topbar"><h1>Department Dashboard</h1></div>
        <div class="page">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <div class="stats-grid">
                <div class="stat-card"><div class="stat-num" th:text="${#lists.size(deptCourses)}"></div><div class="stat-label">Department Courses</div></div>
                <div class="stat-card"><div class="stat-num" th:text="${#lists.size(pendingEnrollments)}"></div><div class="stat-label">Pending Enrollments</div></div>
                <div class="stat-card"><div class="stat-num" th:text="${#lists.size(pendingGrades)}"></div><div class="stat-label">Pending Grades</div></div>
            </div>

            <div class="card">
                <div class="card-title">Course Monitoring</div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Code</th><th>Course</th><th>Faculty</th><th>Seats</th></tr></thead>
                        <tbody>
                        <tr th:each="course : ${deptCourses}">
                            <td th:text="${course.courseCode}"></td>
                            <td th:text="${course.courseName}"></td>
                            <td th:text="${course.faculty != null ? course.faculty.name : 'Unassigned'}"></td>
                            <td th:text="${course.availableSeats + ' / ' + course.maxSeats}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Report Preview</div>
                <pre class="report-preview" th:text="${reportPreview}"></pre>
            </div>
        </div>
    </div>
</div>
</body>
</html>
