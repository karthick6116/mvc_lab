<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Materials</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-brand"><h2>👨‍🏫 Faculty Portal</h2><p th:text="${faculty.name}"></p></div>
        <a th:href="@{/faculty/courses}">📚 Assigned Courses</a>
        <a th:href="@{/faculty/students}">👥 Enrolled Students</a>
        <a th:href="@{/faculty/grades}">📝 Submit Grades</a>
        <a th:href="@{/faculty/attendance}">🕒 Attendance</a>
        <a th:href="@{/faculty/materials}" class="active">📁 Course Materials</a>
        <div class="sidebar-logout"><a th:href="@{/logout}" class="btn btn-danger btn-full btn-sm">Logout</a></div>
    </nav>
    <div class="main-content">
        <div class="topbar"><h1>Course Materials</h1></div>
        <div class="page">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div class="card">
                <form method="get" th:action="@{/faculty/materials}" class="inline-form">
                    <select name="courseId">
                        <option value="">Select course</option>
                        <option th:each="c : ${courses}" th:value="${c.courseId}" th:text="${c.courseCode + ' - ' + c.courseName}" th:selected="${course != null and course.courseId == c.courseId}"></option>
                    </select>
                    <button type="submit" class="btn btn-primary">Load Materials</button>
                </form>
            </div>

            <div class="card" th:if="${course != null}">
                <div class="card-title" th:text="${'Upload material for ' + course.courseCode + ' - ' + course.courseName}"></div>
                <form method="post" th:action="@{/faculty/materials/upload}" enctype="multipart/form-data" class="stack-form">
                    <input type="hidden" name="courseId" th:value="${course.courseId}">
                    <input type="text" name="title" placeholder="Material title" required>
                    <textarea name="description" rows="3" placeholder="Description (optional)"></textarea>
                    <input type="file" name="file" required>
                    <div class="form-note">Allowed: pdf, ppt, pptx, mp4, avi, mov, txt · Max 10 MB</div>
                    <button type="submit" class="btn btn-success">Upload</button>
                </form>
            </div>

            <div class="card" th:if="${course != null}">
                <div class="card-title">Uploaded Materials</div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Title</th><th>Type</th><th>Uploaded</th><th>Size</th></tr></thead>
                        <tbody>
                        <tr th:each="material : ${materials}">
                            <td>
                                <div class="strong" th:text="${material.title}"></div>
                                <div class="muted small" th:text="${material.description}"></div>
                            </td>
                            <td th:text="${material.fileType}"></td>
                            <td th:text="${#dates.format(material.uploadDate, 'yyyy-MM-dd HH:mm')}"></td>
                            <td th:text="${material.fileSize + ' bytes'}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(materials)}"><td colspan="4" class="empty">No materials uploaded for this course yet.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
