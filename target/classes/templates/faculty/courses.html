<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-brand"><h2>👨‍🏫 Faculty Portal</h2><p th:text="${faculty.name}"></p></div>
        <a th:href="@{/faculty/courses}" class="active">📚 Assigned Courses</a>
        <a th:href="@{/faculty/students}">👥 Enrolled Students</a>
        <a th:href="@{/faculty/grades}">📝 Submit Grades</a>
        <a th:href="@{/faculty/attendance}">🕒 Attendance</a>
        <a th:href="@{/faculty/materials}">📁 Course Materials</a>
        <div class="sidebar-logout"><a th:href="@{/logout}" class="btn btn-danger btn-full btn-sm">Logout</a></div>
    </nav>

    <div class="main-content">
        <div class="topbar"><h1>Assigned Courses</h1></div>
        <div class="page">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Code</th><th>Course</th><th>Seats</th><th>Department</th><th>Actions</th></tr></thead>
                        <tbody>
                        <tr th:each="course : ${courses}">
                            <td th:text="${course.courseCode}"></td>
                            <td>
                                <div class="strong" th:text="${course.courseName}"></div>
                                <div class="muted small" th:text="${course.description}"></div>
                            </td>
                            <td th:text="${course.availableSeats + ' / ' + course.maxSeats}"></td>
                            <td th:text="${course.department}"></td>
                            <td>
                                <div class="action-stack horizontal">
                                    <a class="btn btn-gray btn-sm" th:href="@{'/faculty/students?courseId=' + ${course.courseId}}">Students</a>
                                    <a class="btn btn-primary btn-sm" th:href="@{'/faculty/grades?courseId=' + ${course.courseId}}">Grades</a>
                                    <a class="btn btn-success btn-sm" th:href="@{'/faculty/attendance?courseId=' + ${course.courseId}}">Attendance</a>
                                    <a class="btn btn-gray btn-sm" th:href="@{'/faculty/materials?courseId=' + ${course.courseId}}">Materials</a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(courses)}"><td colspan="5" class="empty">No courses have been assigned yet.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
