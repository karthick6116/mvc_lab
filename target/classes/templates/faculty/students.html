<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Enrolled Students</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-brand"><h2>👨‍🏫 Faculty Portal</h2><p th:text="${faculty.name}"></p></div>
        <a th:href="@{/faculty/courses}">📚 Assigned Courses</a>
        <a th:href="@{/faculty/students}" class="active">👥 Enrolled Students</a>
        <a th:href="@{/faculty/grades}">📝 Submit Grades</a>
        <a th:href="@{/faculty/attendance}">🕒 Attendance</a>
        <a th:href="@{/faculty/materials}">📁 Course Materials</a>
        <div class="sidebar-logout"><a th:href="@{/logout}" class="btn btn-danger btn-full btn-sm">Logout</a></div>
    </nav>

    <div class="main-content">
        <div class="topbar"><h1>Enrolled Students</h1></div>
        <div class="page">
            <div class="card">
                <form method="get" th:action="@{/faculty/students}" class="inline-form">
                    <select name="courseId">
                        <option value="">Select course</option>
                        <option th:each="c : ${courses}" th:value="${c.courseId}" th:text="${c.courseCode + ' - ' + c.courseName}" th:selected="${course != null and course.courseId == c.courseId}"></option>
                    </select>
                    <button type="submit" class="btn btn-primary">Load Students</button>
                </form>
            </div>

            <div class="card" th:if="${course != null}">
                <div class="card-title" th:text="${'Students in ' + course.courseCode + ' - ' + course.courseName}"></div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Student ID</th><th>Name</th><th>Email</th><th>Semester</th><th>Status</th></tr></thead>
                        <tbody>
                        <tr th:each="enrollment : ${enrollments}">
                            <td th:text="${enrollment.student.studentId}"></td>
                            <td th:text="${enrollment.student.name}"></td>
                            <td th:text="${enrollment.student.email}"></td>
                            <td th:text="${enrollment.student.semester}"></td>
                            <td><span th:classappend="${enrollment.status.name().toLowerCase()}" class="badge badge-plain" th:text="${enrollment.status}"></span></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(enrollments)}"><td colspan="5" class="empty">No approved students found for this course.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
