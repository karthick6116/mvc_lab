<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - SCM System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-bg">
    <div class="auth-card">
        <div style="text-align:center; font-size:52px; margin-bottom:12px;">🎓</div>
        <h1 style="text-align:center">Welcome Back</h1>
        <p style="text-align:center">Student Course Management System</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form method="post" th:action="@{/login}">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" required autofocus>
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
            <div class="btn-row">
                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </div>
        </form>

        <div style="text-align:center; margin-top:18px;">
            <a th:href="@{/signup}" class="btn btn-success btn-full" style="margin-top:10px;">New User? Sign Up</a>
        </div>
    </div>
</div>
</body>
</html>
