<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Courses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-brand"><h2>⚙️ Admin Portal</h2><p th:text="${admin.name}"></p></div>
        <a th:href="@{/admin/dashboard}">📊 Dashboard</a>
        <a th:href="@{/admin/courses}" class="active">📚 Manage Courses</a>
        <a th:href="@{/admin/users}">👥 Users</a>
        <a th:href="@{/admin/enrollments}">📝 Enrollments & Payments</a>
        <a th:href="@{/signup}">➕ Add New User</a>
        <a th:href="@{/admin/report}">📄 Download Report</a>
        <div class="sidebar-logout"><a th:href="@{/logout}" class="btn btn-danger btn-full btn-sm">Logout</a></div>
    </nav>
    <div class="main-content">
        <div class="topbar"><h1>Manage Courses</h1></div>
        <div class="page">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <div class="card">
                <div class="card-title">Create New Course</div>
                <form method="post" th:action="@{/admin/courses/create}" class="form-grid">
                    <input type="text" name="courseCode" placeholder="Course code" required>
                    <input type="text" name="courseName" placeholder="Course name" required>
                    <input type="number" name="credits" min="1" max="6" placeholder="Credits" required>
                    <input type="number" name="maxSeats" min="1" max="100" placeholder="Seats" required>
                    <input type="text" name="department" placeholder="Department" required>
                    <input type="number" name="feeAmount" min="0.01" step="0.01" placeholder="Fee amount">
                    <textarea name="description" rows="3" class="form-full" placeholder="Description"></textarea>
                    <div class="form-full"><button type="submit" class="btn btn-success">Create Course</button></div>
                </form>
            </div>

            <div class="card">
                <div class="card-title">All Courses</div>
                <div class="table-wrap wide-table">
                    <table>
                        <thead><tr><th>Course</th><th>Current Details</th><th>Update</th><th>Assign Faculty</th></tr></thead>
                        <tbody>
                        <tr th:each="course : ${courses}">
                            <td>
                                <div class="strong" th:text="${course.courseCode + ' - ' + course.courseName}"></div>
                                <div class="muted small" th:text="${course.department}"></div>
                            </td>
                            <td>
                                <div class="small">Credits: <span th:text="${course.credits}"></span></div>
                                <div class="small">Seats: <span th:text="${course.availableSeats + ' / ' + course.maxSeats}"></span></div>
                                <div class="small">Fee: <span th:text="${'$' + #numbers.formatDecimal(course.feeAmount,1,2)}"></span></div>
                                <div class="small">Faculty: <span th:text="${course.faculty != null ? course.faculty.name : 'Unassigned'}"></span></div>
                            </td>
                            <td>
                                <form method="post" th:action="@{/admin/courses/update}" class="stack-form compact-form">
                                    <input type="hidden" name="courseId" th:value="${course.courseId}">
                                    <input type="text" name="courseCode" th:value="${course.courseCode}" required>
                                    <input type="text" name="courseName" th:value="${course.courseName}" required>
                                    <input type="number" name="credits" min="1" max="6" th:value="${course.credits}" required>
                                    <input type="number" name="maxSeats" min="1" max="100" th:value="${course.maxSeats}" required>
                                    <input type="text" name="department" th:value="${course.department}" required>
                                    <input type="number" name="feeAmount" min="0.01" step="0.01" th:value="${course.feeAmount}">
                                    <textarea name="description" rows="2" th:text="${course.description}"></textarea>
                                    <button type="submit" class="btn btn-primary btn-sm">Update</button>
                                </form>
                            </td>
                            <td>
                                <form method="post" th:action="@{/admin/courses/assign-faculty}" class="stack-form compact-form">
                                    <input type="hidden" name="courseId" th:value="${course.courseId}">
                                    <select name="facultyUserId" required>
                                        <option value="">Select faculty</option>
                                        <option th:each="member : ${faculty}" th:value="${member.userId}" th:text="${member.name}" th:selected="${course.faculty != null and member.userId == course.faculty.userId}"></option>
                                    </select>
                                    <button type="submit" class="btn btn-success btn-sm">Assign</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(courses)}"><td colspan="4" class="empty">No courses available.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
